<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <title>Painel do Bot Whatsapp</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            background: #f5f5f5;
            padding: 20px;
            }

            h1 {
                color: #333;
            }

            .card {
                background: #fff;
                padding: 20px;
                margin-bottom: 20px;
                border-radius: 12px;
                box-shadow: 0 0 10px #0001;
            }
            table {
                width: 100%;
                border-collapse: collapse;
                margin-top: 15px;
                }
                th, td{
                    padding: 8px;
                    border-bottom: 1px solid #ddd;
                }
                th {
                    background: #eee;
                }
                .status-online{
                    color:green;
                    font-weight: bold;
                }
                .status-offline{
                    color:red;
                    font-weight: bold;
                }
            </style>
        </head>
        <body>
            <h1>Painel de Monitoramento do Bot</h1>
            <div class="card">
                <h2>Status do Bot</h2>
                <p><b>Situação:</b> <span id="status">Carregando...</span></p>
                <p><b>Última mensagem:</b> <span id="ultimaMsg">–</span></p>
                <p><b>Atualizado em:</b> <span id="atualizado">–</span></p>
                <p><a href="/qr" target="_blank">Abrir QR em imagem</a></p>
            </div>
            <!-- PERGUNTAS MAIS FREQUENTES -->
            <div class="card">
                <h2>Perguntas Mais Comuns</h2>
                <table>
                    <thead>
                        <tr>
                            <th>Perguntas</th>
                            <th>Quantidade</th>
                        </tr>
                    </thead>
                    <tbody id="tabelaPerguntas"></tbody>
                </table>
            </div>
            <script>
                async function atualizarPainel() {
                    try {
                        const res = await fetch("/status");
                        const data = await res.json();
                        document.getElementById("status").textContent = data.online ? "Online" : "Offline";
                        document.getElementById("status").className = data.online ? "status-online" : "status-offline";
                        document.getElementById("ultimaMsg").textContent = data.ultimaMsg || "Nenhuma";
                        document.getElementById("atualizado").textContent = new Date().toLocaleTimeString();
                        const tabela = document.getElementById("tabelaPerguntas");
                        tabela.innerHTML = "";
                        const lista = Array.isArray(data.ranking) ? data.ranking : [];
                        if (lista.length === 0) {
                            tabela.innerHTML = `<tr><td colspan="2">Sem dados</td></tr>`;
                        } else {
                            lista.forEach(item => {
                                tabela.innerHTML += `
                                    <tr>
                                        <td>${item.pergunta}</td>
                                        <td>${item.quantidade}</td>
                                    </tr>
                                `;
                            });
                        }
                    } catch (error) {
                        console.error("Erro ao atualizar tabela:", error);
                        document.getElementById("status").textContent = "Erro";
                        document.getElementById("status").className = "status-offline";
                        document.getElementById("ultimaMsg").textContent = "–";
                        const tabela = document.getElementById("tabelaPerguntas");
                        tabela.innerHTML = `<tr><td colspan="2">Falha ao carregar</td></tr>`;
                    }
                }
                atualizarPainel();
                setInterval(atualizarPainel, 5000);
            </script>

        </body>
        </html>
